version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofumpt
    - goimports

linters:
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - errcheck
    - errorlint
    - gocritic
    - govet
    - ineffassign
    - intrange
    - misspell
    - nilerr
    - prealloc
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gocritic:
      disabled-tags:
        - style
        - experimental
        - opinionated
  exclusions:
    paths:
      - vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
